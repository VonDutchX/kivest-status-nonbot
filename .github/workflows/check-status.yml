name: Check Model Status

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: check-model-status
  cancel-in-progress: false

jobs:
  check-status:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run status checks
        env:
          KIVEST_API_KEY: ${{ secrets.KIVEST_API_KEY }}
          API_PROXY_URL: ${{ secrets.API_PROXY_URL }}
          PROXY_TOKEN: ${{ secrets.PROXY_TOKEN }}
        run: node scripts/check-models.js

      - name: Commit updated status data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/status.json data/history.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update model status [skip ci]"
            git fetch origin main
            # Rebase, auto-resolving data file conflicts with our (CI) version
            if ! git rebase origin/main; then
              git checkout --theirs data/status.json data/history.json 2>/dev/null || true
              git add data/status.json data/history.json
              GIT_EDITOR=true git rebase --continue || true
            fi
            git push
          fi
