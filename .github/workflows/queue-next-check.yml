name: Queue Next Status Check

on:
  workflow_run:
    workflows:
      - Check Model Status
    types:
      - completed
    branches:
      - main

permissions:
  actions: write
  contents: read

concurrency:
  group: check-model-status-requeue
  cancel-in-progress: true

jobs:
  queue-next-run:
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait 1 minute
        run: sleep 60

      - name: Dispatch next status check
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.event.repository.default_branch }}
        run: |
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/check-status.yml/dispatches" \
            -d "{\"ref\":\"${REF_NAME}\"}"