<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kivest Status</title>
  <meta name="description" content="Unofficial community status page for Kivest AI models. Real-time uptime, response times, and availability.">
  <meta name="theme-color" content="#fafafa">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-spinner"></div>
    <span class="loading-text">Loading</span>
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a class="nav-brand" href="#">
        <img src="https://i.ibb.co/xqW09xK3/image-removebg-preview-2.png" alt="Kivest" class="nav-logo">
        <span>Kivest Status</span>
      </a>
      <div class="nav-links">
        <div class="live-indicator">
          <div class="live-dot"></div>
          <span>Live</span>
        </div>
        <a href="https://ai.ezif.in/" target="_blank" rel="noopener">API</a>
        <a href="https://ai.ezif.in/docs" target="_blank" rel="noopener">Docs</a>
        <a href="https://github.com/FlazeIGuess/kivest-status" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-glow"></div>
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="hero-title-line">Real-time</span>
        <span class="hero-title-line"><em id="hero-title">AI Model Status</em></span>
      </h1>
      <p id="hero-subtitle" class="hero-subtitle">Monitoring every Kivest model, every minute.</p>
      <div id="last-updated" class="last-updated">Waiting for data...</div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-item">
        <span id="stat-online" class="stat-number">-</span>
        <span class="stat-label">Online</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span id="stat-down" class="stat-number">-</span>
        <span class="stat-label">Down</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span id="stat-uptime" class="stat-number">-</span>
        <span class="stat-label">Avg Uptime</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span id="stat-total" class="stat-number">-</span>
        <span class="stat-label">Total Models</span>
      </div>
    </div>
  </section>

  <!-- Models Section -->
  <section class="section-models">
    <div class="section-inner">

      <!-- Section Header -->
      <div class="section-header">
        <h2 class="section-title">All Models</h2>
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search-input" type="text" placeholder="Search models...">
        </div>
      </div>

      <!-- Filters -->
      <div class="filters">
        <div class="filter-tabs">
          <button class="filter-tab active" id="filter-tab-all" data-provider="all">All</button>
          <button class="filter-scroll-btn filter-scroll-left" id="scroll-left" aria-label="Scroll left">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="filter-tabs-scroll" id="provider-tabs"></div>
          <button class="filter-scroll-btn filter-scroll-right" id="scroll-right" aria-label="Scroll right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="filter-status-group">
          <button class="filter-status-btn" data-status="online">
            <span class="filter-dot green"></span> Online
          </button>
          <button class="filter-status-btn" data-status="paid">
            <span class="filter-dot amber"></span> Paid Only
          </button>
          <button class="filter-status-btn" data-status="offline">
            <span class="filter-dot red"></span> Offline
          </button>
          <button class="filter-status-btn" id="filter-reasoning" data-status="reasoning">
            <span class="filter-dot purple"></span> Reasoning
          </button>
        </div>
      </div>

      <!-- Model Grid -->
      <div id="model-grid" class="model-grid">
        <!-- Rendered by JS -->
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-brand">Kivest Status</span>
      <div class="footer-links">
        <a href="https://ai.ezif.in/docs" target="_blank" rel="noopener">API Docs</a>
        <a href="https://github.com/FlazeIGuess/kivest-status" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
