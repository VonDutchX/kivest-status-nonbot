services:
  kivest-proxy:
    build:
      context: .

    container_name: kivest-proxy
    restart: unless-stopped
    ports:
      - "3099:3099"
    environment:
      - PORT=3099
      - PROXY_TOKEN=${PROXY_TOKEN:?PROXY_TOKEN is required}
      - UPSTREAM_BASE_URL=${UPSTREAM_BASE_URL:-https://ai.ezif.in}
